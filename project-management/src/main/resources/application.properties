spring.application.name=project-management
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${USERNAME}
spring.datasource.password = ${PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8081


spring.mail.host = smtp.gmail.com
spring.mail.port = 587
spring.mail.username = ${MY_GMAIL}
spring.mail.password = ${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true

razorpay.api.key = ${RAZORPAY_KEY}
razorpay.api.secret = ${RAZORPAY_SECRET}

resilience4j.ratelimiter.instances.globalRateLimiter.limitForPeriod=100
resilience4j.ratelimiter.instances.globalRateLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.globalRateLimiter.timeoutDuration=0
